name: Daily Safety Briefing Update

on:
  schedule:
    # 22:00 UTC = 07:00 KST (다음날) — GitHub 스케줄은 트래픽에 따라 몇 분~몇십 분 지연될 수 있습니다
    - cron: '0 22 * * *'
  workflow_dispatch: {}  # Actions 탭에서 수동 실행 버튼도 생김

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet --cached || git commit -m "chore: daily safety briefing update"
          git push
